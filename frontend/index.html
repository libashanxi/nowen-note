<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon：品牌蓝 + 白色笔记 + N 字母，替代 Vite 默认图标 -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- 老旧浏览器回退到品牌 PNG logo -->
    <link rel="alternate icon" type="image/svg+xml" href="/nowen-note-icon.svg" />
    <!-- iOS 添加到主屏幕 -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <!-- 品牌主题色（地址栏/PWA） -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- 使用系统字体栈，避免依赖 Google Fonts CDN（国内 Android 设备可能加载超时） -->
    <title>nowen-note</title>
  </head>
  <body>
    <div id="root" style="height:100vh;width:100vw;overflow:hidden;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
