services:
  nowen-note:
    build:
      context: .
      dockerfile: Dockerfile
    image: nowen-note:latest
    container_name: nowen-note
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - nowen-note-data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/nowen-note.db
      - PORT=3001
      - ONLYOFFICE_URL=http://onlyoffice:80
      - ONLYOFFICE_JWT_SECRET=nowen-note-onlyoffice-secret
      - APP_CALLBACK_URL=http://nowen-note:3001
      # Ollama 地址，如需使用请自行部署 Ollama 并填写正确地址
      # - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      - onlyoffice

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: nowen-onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=nowen-note-onlyoffice-secret

volumes:
  nowen-note-data:
    driver: local
  onlyoffice-data:
    driver: local
  onlyoffice-logs:
    driver: local
